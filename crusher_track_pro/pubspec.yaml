name: CrusherTrack
description: "CrusherTrack - Crusher & Project Management System"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # ==========================
  # Networking
  # ==========================
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # ==========================
  # State Management
  # ==========================
  provider: ^6.1.5

  # ==========================
  # Secure Storage
  # ==========================
  flutter_secure_storage: ^9.2.4

  # ==========================
  # Internet Connection
  # ==========================
  connectivity_plus: ^7.0.0

  # ==========================
  # Local Storage
  # ==========================
  shared_preferences: ^2.5.3

  # ==========================
  # Date Formatting
  # ==========================
  intl: ^0.20.2

  # ==========================
  # SVG Support
  # ==========================
  flutter_svg: ^2.2.0

  # ==========================
  # Cached Images
  # ==========================
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/logo.png